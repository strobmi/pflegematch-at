<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 60" width="140" height="60">
  <!-- White background -->
  <rect width="140" height="60" fill="white"/>
  <!-- Red top stripe -->
  <rect x="0" y="0" width="140" height="20" fill="#CC0000"/>
  <!-- White middle stripe (already white bg) -->
  <!-- Red bottom stripe -->
  <rect x="0" y="40" width="140" height="20" fill="#CC0000"/>
  <!-- WKO text in black over white middle -->
  <text x="48" y="37" font-family="Arial Black, Arial, sans-serif" font-size="26" font-weight="900" fill="#1A1A1A" text-anchor="middle" letter-spacing="1">WKO</text>
  <!-- Austrian flag bars on the right (vertical) -->
  <rect x="105" y="0" width="11" height="60" fill="#CC0000"/>
  <rect x="116" y="0" width="11" height="60" fill="white"/>
  <rect x="127" y="0" width="13" height="60" fill="#CC0000"/>
  <!-- Horizontal dash line after WKO -->
  <line x1="78" y1="30" x2="100" y2="30" stroke="#1A1A1A" stroke-width="3"/>
</svg>
