services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: pflegematch
      POSTGRES_USER: pflegematch
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pflegematch -d pflegematch"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://pflegematch:${POSTGRES_PASSWORD}@postgres:5432/pflegematch"
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      WHEREBY_API_KEY: ${WHEREBY_API_KEY}
      NODE_ENV: production
    ports:
      - "127.0.0.1:3002:3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pflegematch.rule=Host(`pflegematch.at`)"
      - "traefik.http.routers.pflegematch.entrypoints=websecure"
      - "traefik.http.routers.pflegematch.tls.certresolver=letsencrypt"
      - "traefik.http.services.pflegematch.loadbalancer.server.url=http://127.0.0.1:3002"
      - "traefik.http.middlewares.pflegematch-www-redirect.redirectregex.regex=^https://www\\.pflegematch\\.at(.*)"
      - "traefik.http.middlewares.pflegematch-www-redirect.redirectregex.replacement=https://pflegematch.at$${1}"
      - "traefik.http.middlewares.pflegematch-www-redirect.redirectregex.permanent=true"
      - "traefik.http.routers.pflegematch-www.rule=Host(`www.pflegematch.at`)"
      - "traefik.http.routers.pflegematch-www.entrypoints=websecure"
      - "traefik.http.routers.pflegematch-www.tls.certresolver=letsencrypt"
      - "traefik.http.routers.pflegematch-www.middlewares=pflegematch-www-redirect"
      - "traefik.http.routers.pflegematch-www.service=pflegematch"
    networks:
      - internal

