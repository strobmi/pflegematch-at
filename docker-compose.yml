services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: pflegematch
      POSTGRES_USER: pflegematch
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    # Kein externer Port — nur internes Netzwerk

  web:
    build: .
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: "postgresql://pflegematch:${POSTGRES_PASSWORD}@postgres:5432/pflegematch"
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NODE_ENV: production
    # Vorerst direkt über VPS-IP:3001 erreichbar
    # Sobald Domain verfügbar: Port-Binding entfernen und Traefik-Labels einkommentieren
    ports:
      - "0.0.0.0:3001:3000"
    networks:
      - internal

    # --- Traefik-Labels (einkommentieren sobald Domain verfügbar) ---
    # labels:
    #   - "traefik.enable=true"
